name: Update Economic Data

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 18 * * 6" # At 18:00 on Saturday
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    environment:
      name: prod
    permissions:
      contents: write # Write access is needed to push changes back to the repository
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
        with:
          version: "latest"

      - name: Running update script
        env:
          FRED_API_TOKEN: ${{ secrets.FRED_API_TOKEN }}
        run: |
          uv run python main.py

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main'
        run: |
          git status
          git config --local user.email "noreply@github.com"
          git config --local user.name "github-actions[bot]"
          git add data/raw/
          git add data/metadata.json
          if ! git diff-index --quiet HEAD; then
            git commit -m "Update of raw economic changes - $(date +'%Y-%m-%d')"
            git push -u origin main
          fi
