name: Update Economic Data

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 18 * * 6" # At 18:00 on Saturday
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    environment:
      name: prod
    permissions:
      contents: write # Write access is needed to push changes back to the repository
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"

      - name: Running update script
        env:
          FRED_API_TOKEN: ${{ secrets.FRED_API_TOKEN }}
        run: |
          uv run python main.py

      - name: Verify data freshness
        run: |
          uv run --group dev pytest tests/test_freshness.py -v

      - name: Update README dashboard
        run: |
          uv run python -m src.readme_updater

      - name: Commit and push changes
        if: github.ref == 'refs/heads/main'
        run: |
          git status
          git config --local user.email "noreply@github.com"
          git config --local user.name "github-actions[bot]"
          git add data/raw/
          git add data/derived/
          git add data/metadata.json
          git add README.md
          if ! git diff-index --quiet HEAD; then
            git commit -m "Update of raw economic changes - $(date +'%Y-%m-%d')"
            git push -u origin main
          fi
